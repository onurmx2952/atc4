name: Unzip build.zip

on:
workflow_dispatch:

jobs:
unzip:
runs-on: ubuntu-latest

```
steps:
  - name: Repo'yu çek
    uses: actions/checkout@v4

  - name: unzip kur
    run: sudo apt-get update && sudo apt-get install -y unzip

  - name: build.zip var mı kontrol et
    run: |
      if [ ! -f build.zip ]; then
        echo "build.zip root klasörde yok"
        exit 1
      fi

  - name: ZIP'i aç
    run: |
      unzip -o build.zip -d extracted

  - name: İçeriği root'a taşı
    run: |
      shopt -s dotglob nullglob
      mv extracted/* .
      rm -rf extracted

  - name: build.zip sil
    run: rm -f build.zip

  - name: Commit et
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git add .
      git commit -m "build.zip acildi" || echo "degisiklik yok"
      git push
```
