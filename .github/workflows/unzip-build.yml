name: Unzip build.zip

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          unzip -o build.zip

      - name: commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "unzipped" || echo "no change"
          git push
